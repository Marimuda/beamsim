site_name: beamsim
site_description: Geometry-based mmWave beam-alignment simulator reproducing the MCMD evaluation figures.
site_author: jakupsv
repo_url: https://github.com/jakupsv/beamsim
repo_name: jakupsv/beamsim
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.top
    - content.code.copy
    - content.action.edit
    - search.highlight
    - search.suggest
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: false
            docstring_style: google
            members_order: source
            show_signature_annotations: true
            separate_signature: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - pymdownx.arithmatex:
      generic: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Installation: installation.md
  - Quickstart: quickstart.md
  - Usage: usage.md
  - Architecture: architecture.md
  - Development: development.md
  - SOTA baselines: SOTA_BASELINES.md
  - Related work: related_work.md
  - Roadmap: ROADMAP.md
  - API reference: api.md
  - Changelog: changelog.md
